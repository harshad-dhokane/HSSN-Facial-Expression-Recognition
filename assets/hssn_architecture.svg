<svg xmlns="http://www.w3.org/2000/svg" width="680" height="700" viewBox="0 0 680 700"
     font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <title>HSSN Architecture</title>
  <desc>Hybrid Spatial-Spectral Network: input to stem, four stages of DualPathBlocks with spatial and spectral dual paths, channel gate fusion, SE block with residual, multi-scale pooling, 256-D embedding head, and 8-class classifier.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#5F5E5A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#888780" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Input ─────────────────────────────────── -->
  <rect x="250" y="20" width="180" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="39" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#444441">Input  224 × 224 RGB</text>

  <line x1="340" y1="58" x2="340" y2="73" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Stem ───────────────────────────────────── -->
  <rect x="165" y="75" width="350" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="89" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#0C447C">Stem</text>
  <text x="340" y="107" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#185FA5">7×7 Conv  ·  stride 2  ·  BN + ReLU</text>

  <line x1="340" y1="119" x2="340" y2="141" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ Stage container ════════════════════════════ -->
  <rect x="40" y="143" width="600" height="318" rx="12"
        fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text x="340" y="162" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#5F5E5A">4 stages  ×  3 DualPathBlocks each</text>

  <!-- Spatial path -->
  <rect x="52" y="174" width="226" height="76" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="165" y="197" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#085041">Spatial path</text>
  <text x="165" y="214" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#0F6E56">DW + PW Conv</text>
  <text x="165" y="231" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#0F6E56">local spatial features</text>

  <!-- Spectral path -->
  <rect x="402" y="174" width="226" height="76" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="515" y="197" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#712B13">Spectral path</text>
  <text x="515" y="214" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#993C1D">FFT frequency filter</text>
  <text x="515" y="231" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#993C1D">global frequency features</text>

  <!-- Merge connectors → Channel gate -->
  <path d="M165 250 L165 266 L340 266" fill="none" stroke="#888780" stroke-width="1.2"/>
  <path d="M515 250 L515 266 L340 266" fill="none" stroke="#888780" stroke-width="1.2"/>
  <line x1="340" y1="266" x2="340" y2="272" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Channel gate -->
  <rect x="210" y="272" width="260" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="287" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#633806">Channel gate</text>
  <text x="340" y="305" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#854F0B">Learned α fusion of paths</text>

  <line x1="340" y1="316" x2="340" y2="334" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SE block -->
  <rect x="210" y="334" width="260" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="349" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#3C3489">SE block</text>
  <text x="340" y="367" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#534AB7">Squeeze-excitation recalibration</text>

  <!-- Residual connection arc (right side) -->
  <path d="M470 294 L556 294 L556 356 L472 356"
        fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3"
        marker-end="url(#arr-sm)"/>
  <text x="560" y="328" text-anchor="start" dominant-baseline="central"
        font-size="10" fill="#888780">+ Residual</text>

  <!-- Stage footer notes -->
  <text x="340" y="404" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#5F5E5A">↓  AntiAlias downsample between stages</text>
  <text x="340" y="424" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#5F5E5A">↻  Cross-Stage Refinement (attention-based)</text>

  <!-- Arrow out of stage container -->
  <line x1="340" y1="461" x2="340" y2="477" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Multi-Scale Pooling ───────────────────── -->
  <rect x="165" y="479" width="350" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="494" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#0C447C">Multi-scale pooling</text>
  <text x="340" y="512" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#185FA5">1×1 + 2×2 + 4×4  →  21 tokens</text>

  <line x1="340" y1="523" x2="340" y2="539" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 256-D Embedding Head ──────────────────── -->
  <rect x="165" y="541" width="350" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="556" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#3C3489">256-D embedding head</text>
  <text x="340" y="574" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#534AB7">L2-normalized feature vector</text>

  <line x1="340" y1="585" x2="340" y2="601" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── 8-Class Classifier ────────────────────── -->
  <rect x="165" y="603" width="350" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="618" text-anchor="middle" dominant-baseline="central"
        font-size="13" font-weight="600" fill="#712B13">8-class classifier</text>
  <text x="340" y="636" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#993C1D">Softmax output</text>

  <!-- ── Color legend ──────────────────────────── -->
  <rect x="40" y="664" width="600" height="22" rx="6" fill="#F8F7F4" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="56"  y="671" width="8" height="8" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="68"  y="675" dominant-baseline="central" font-size="10" fill="#5F5E5A">Spatial</text>
  <rect x="118" y="671" width="8" height="8" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="130" y="675" dominant-baseline="central" font-size="10" fill="#5F5E5A">Spectral / output</text>
  <rect x="230" y="671" width="8" height="8" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="242" y="675" dominant-baseline="central" font-size="10" fill="#5F5E5A">Fusion</text>
  <rect x="294" y="671" width="8" height="8" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="306" y="675" dominant-baseline="central" font-size="10" fill="#5F5E5A">Attention / embedding</text>
  <rect x="436" y="671" width="8" height="8" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="448" y="675" dominant-baseline="central" font-size="10" fill="#5F5E5A">Input / pooling</text>
</svg>
